<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Wave mark -->
  <g transform="translate(0, 10)">
    <!-- Back wave -->
    <path d="M8 55 Q20 38 32 55 Q44 72 56 55 Q68 38 80 55 Q92 72 104 55 Q116 38 128 55"
      stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.45"/>
    <!-- Middle wave -->
    <path d="M4 65 Q18 46 32 65 Q46 84 60 65 Q74 46 88 65 Q102 84 116 65 Q130 46 144 65"
      stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Front wave -->
    <path d="M0 76 Q16 55 32 76 Q48 97 64 76 Q80 55 96 76 Q112 97 128 76 Q144 55 160 76"
      stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="176" y="52" font-family="Georgia, 'Times New Roman', serif"
    font-size="13" font-weight="400" fill="#94a3b8" letter-spacing="4">
    THE
  </text>
  <text x="176" y="84" font-family="Georgia, 'Times New Roman', serif"
    font-size="38" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">
    Florida Flow
  </text>

  <!-- Tagline -->
  <text x="178" y="104" font-family="Arial, sans-serif"
    font-size="10.5" fill="#38bdf8" letter-spacing="2.5">
    SOUTH FLORIDA OCEAN CONDITIONS
  </text>
</svg>
